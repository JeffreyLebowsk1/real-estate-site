<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact | Matt Dilworth, REALTOR&reg;</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Get in touch with Matt Dilworth for buying or selling real estate in Sanford, NC.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div id="top-bar"></div>
  <div id="site-nav"></div>

  <section class="page-hero">
    <div class="container">
      <h1>Book an Appointment</h1>
      <p class="lead">I'd love to hear from you</p>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div class="row g-5">
        <div class="col-lg-7">
          <div class="card shadow">
            <div class="card-body p-4">
              <h2 class="h4 mb-3">Send a message</h2>
              <div id="contact-alert" class="alert d-none mb-3" role="alert"></div>
              <form id="contact-form" novalidate>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="contactName" class="form-label">Name</label>
                    <input type="text" class="form-control" id="contactName" required>
                  </div>
                  <div class="col-md-6">
                    <label for="contactEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="contactEmail" required>
                  </div>
                  <div class="col-md-6">
                    <label for="contactPhone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="contactPhone">
                  </div>
                  <div class="col-12">
                    <label for="contactMessage" class="form-label">Message</label>
                    <textarea class="form-control" id="contactMessage" rows="5" required></textarea>
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-primary btn-lg">Submit</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
        <div class="col-lg-5">
          <h3>Contact Info</h3>
          <ul class="list-unstyled fs-5">
            <li class="mb-3"><strong>Phone:</strong> <a href="tel:+19197211111">(919) 721-1111</a></li>
            <li class="mb-3"><strong>Email:</strong> <a href="mailto:matt@mdilworth.com">matt@mdilworth.com</a></li>
            <li class="mb-3"><strong>Address:</strong> 304 N Horner Blvd, Sanford, NC 27330</li>
          </ul>
          <h3 class="mt-4">Office Hours</h3>
          <p>Monday &ndash; Friday: 9 AM &ndash; 6 PM<br>Saturday: 10 AM &ndash; 4 PM<br>Sunday: By appointment</p>
        </div>
      </div>
    </div>
  </section>

  <div id="cta-band"></div>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/forms.js"></script>
</body>
</html>
