<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin{% endblock %} — mdilworth.com</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root { --primary: #5bc5c8; --primary-dark: #3ba8ab; }
    body  { background: #f4f6f9; }
    .sidebar {
      width: 220px; min-height: 100vh; background: #1a2233;
      position: fixed; top: 0; left: 0; padding-top: 1rem;
    }
    .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: .75rem 1.25rem; border-bottom: 1px solid #2e3d57; margin-bottom: .5rem; }
    .sidebar .nav-link { color: #b0bec5; padding: .5rem 1.25rem; border-radius: 0; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(91,197,200,.15); }
    .sidebar .nav-link i { margin-right: .5rem; }
    .main-content { margin-left: 220px; padding: 2rem; }
    .stat-card { border: none; border-radius: .75rem; }
    .badge-new       { background: #0d6efd; }
    .badge-contacted { background: #0dcaf0; color: #000; }
    .badge-client    { background: #198754; }
    .badge-spam      { background: #dc3545; }
    .badge-archived  { background: #6c757d; }
  </style>
</head>
<body>

<div class="sidebar d-flex flex-column">
  <div class="brand"><i class="bi bi-house-heart"></i> mdilworth CRM</div>
  <nav class="nav flex-column mt-1">
    <a class="nav-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}"
       href="{{ url_for('admin.dashboard') }}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a class="nav-link {% if request.endpoint in ('admin.leads','admin.lead_detail') %}active{% endif %}"
       href="{{ url_for('admin.leads') }}">
      <i class="bi bi-people"></i> All Leads
    </a>
    <a class="nav-link" href="{{ url_for('admin.leads', status='new') }}">
      <i class="bi bi-envelope-open"></i> New
    </a>
    <a class="nav-link" href="{{ url_for('admin.leads', status='client') }}">
      <i class="bi bi-star"></i> Clients
    </a>
    <a class="nav-link" href="{{ url_for('admin.leads', status='spam') }}">
      <i class="bi bi-slash-circle"></i> Spam
    </a>
    <hr class="border-secondary mx-3">
    <a class="nav-link" href="{{ url_for('admin.export_csv') }}">
      <i class="bi bi-download"></i> Export CSV
    </a>
    <a class="nav-link text-danger" href="{{ url_for('admin.logout') }}">
      <i class="bi bi-box-arrow-left"></i> Log out
    </a>
  </nav>
</div>

<div class="main-content">
  {% with messages = get_flashed_messages(with_categories=True) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
